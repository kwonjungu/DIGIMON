<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>디지몬(DIGIMON) · 데이터로 만나는 반려동물 사회</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Jua&display=swap" rel="stylesheet">
    <style>
        body { font-family:'Jua',sans-serif; background-color:#ECFEFF; }
        .card-hover { transition:transform .3s cubic-bezier(.175,.885,.32,1.275),box-shadow .3s; border:1px solid #E5E5E5; box-shadow:0 4px 12px rgba(0,0,0,.1),0 2px 6px rgba(0,0,0,.05); }
        .card-hover:hover { transform:translateY(-10px) rotate(-2deg); box-shadow:0 20px 40px rgba(0,0,0,.1); cursor:pointer; }
        @keyframes bounce-slow { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-12px)} }
        .bounce-slow { animation:bounce-slow 2s ease-in-out infinite; }
        @keyframes float { 0%,100%{transform:translateY(0) rotate(0deg)} 25%{transform:translateY(-6px) rotate(2deg)} 75%{transform:translateY(4px) rotate(-2deg)} }
        .float-anim { animation:float 3s ease-in-out infinite; }
        .badge { position:absolute; top:-10px; right:-10px; padding:4px 14px; border-radius:999px; font-size:.85rem; font-weight:bold; color:white; box-shadow:0 4px 10px rgba(0,0,0,.1); }
        @media print { body{background:white!important} .card-hover{box-shadow:none!important;transform:none!important} }
    </style>
</head>
<body class="text-gray-800 pb-20 p-4 md:p-8">

<header class="text-center mb-16 mt-8">
    <div class="inline-block bounce-slow mb-6">
        <div class="w-28 h-28 bg-white rounded-full flex items-center justify-center text-6xl shadow-lg border-4 border-teal-200 mx-auto">
            <i class="fa-solid fa-paw text-teal-500"></i>
        </div>
    </div>
    <h1 class="text-4xl md:text-5xl font-bold text-teal-600 mb-4 drop-shadow-sm">
        DIGIMON<br>
        <span class="text-2xl md:text-3xl text-teal-500">데이터로 만나는 반려동물 사회</span>
    </h1>
    <p class="text-xl md:text-2xl text-gray-500 max-w-2xl mx-auto leading-relaxed">
        차시를 선택하면 활동지로 이동해요!
    </p>
</header>

<main class="max-w-5xl mx-auto">
    <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-5 gap-6">

        <!-- 1~2차시 -->
        <a href="1-2/" class="card-hover bg-white rounded-3xl p-6 shadow-md border-b-8 border-teal-400 text-center flex flex-col items-center relative group">
            <div class="badge bg-teal-500">문제 마주보기</div>
            <div class="w-20 h-20 bg-teal-100 rounded-full flex items-center justify-center text-4xl text-teal-500 mb-3 shadow-inner float-anim">
                <i class="fa-solid fa-magnifying-glass-chart"></i>
            </div>
            <h3 class="text-2xl font-bold text-teal-600 mb-2">1~2차시</h3>
            <p class="text-base text-gray-600 leading-snug mb-3">데이터로 만나는<br>반려동물 사회</p>
            <span class="bg-teal-100 text-teal-700 px-3 py-1 rounded-full text-xs font-bold">활동 3개</span>
        </a>

        <!-- 3~4차시 -->
        <a href="3-4/" class="card-hover bg-white rounded-3xl p-6 shadow-md border-b-8 border-purple-400 text-center flex flex-col items-center relative group opacity-60">
            <div class="badge bg-purple-500">준비 중</div>
            <div class="w-20 h-20 bg-purple-100 rounded-full flex items-center justify-center text-4xl text-purple-500 mb-3 shadow-inner float-anim" style="animation-delay:.3s">
                <i class="fa-solid fa-wand-magic-sparkles"></i>
            </div>
            <h3 class="text-2xl font-bold text-purple-600 mb-2">3~4차시</h3>
            <p class="text-base text-gray-600 leading-snug mb-3">나만의 반려동물<br>만들기</p>
            <span class="bg-purple-100 text-purple-700 px-3 py-1 rounded-full text-xs font-bold">개발 예정</span>
        </a>

        <!-- 5~6차시 -->
        <a href="5-6/" class="card-hover bg-white rounded-3xl p-6 shadow-md border-b-8 border-orange-400 text-center flex flex-col items-center relative group opacity-60">
            <div class="badge bg-orange-500">준비 중</div>
            <div class="w-20 h-20 bg-orange-100 rounded-full flex items-center justify-center text-4xl text-orange-500 mb-3 shadow-inner float-anim" style="animation-delay:.6s">
                <i class="fa-solid fa-bowl-food"></i>
            </div>
            <h3 class="text-2xl font-bold text-orange-600 mb-2">5~6차시</h3>
            <p class="text-base text-gray-600 leading-snug mb-3">먹이 주기<br>(이미지 분류)</p>
            <span class="bg-orange-100 text-orange-700 px-3 py-1 rounded-full text-xs font-bold">개발 예정</span>
        </a>

        <!-- 7~8차시 -->
        <a href="7-8/" class="card-hover bg-white rounded-3xl p-6 shadow-md border-b-8 border-blue-400 text-center flex flex-col items-center relative group opacity-60">
            <div class="badge bg-blue-500">준비 중</div>
            <div class="w-20 h-20 bg-blue-100 rounded-full flex items-center justify-center text-4xl text-blue-500 mb-3 shadow-inner float-anim" style="animation-delay:.9s">
                <i class="fa-solid fa-microphone-lines"></i>
            </div>
            <h3 class="text-2xl font-bold text-blue-600 mb-2">7~8차시</h3>
            <p class="text-base text-gray-600 leading-snug mb-3">사이버 동물 키우기<br>(음성 인식)</p>
            <span class="bg-blue-100 text-blue-700 px-3 py-1 rounded-full text-xs font-bold">개발 예정</span>
        </a>

        <!-- 9차시 -->
        <a href="9/" class="card-hover bg-white rounded-3xl p-6 shadow-md border-b-8 border-pink-400 text-center flex flex-col items-center relative group opacity-60">
            <div class="badge bg-pink-500">준비 중</div>
            <div class="w-20 h-20 bg-pink-100 rounded-full flex items-center justify-center text-4xl text-pink-500 mb-3 shadow-inner float-anim" style="animation-delay:1.2s">
                <i class="fa-solid fa-bullhorn"></i>
            </div>
            <h3 class="text-2xl font-bold text-pink-600 mb-2">9차시</h3>
            <p class="text-base text-gray-600 leading-snug mb-3">우리 반 캠페인<br>(캔바)</p>
            <span class="bg-pink-100 text-pink-700 px-3 py-1 rounded-full text-xs font-bold">개발 예정</span>
        </a>
    </div>

    <div class="text-center mt-16">
        <a href="https://playentry.org/" target="_blank" class="inline-flex items-center gap-3 bg-gradient-to-r from-green-400 to-emerald-500 text-white font-bold py-4 px-10 rounded-full text-xl shadow-lg hover:shadow-xl transform transition hover:scale-105 active:scale-95">
            <i class="fa-solid fa-code text-2xl"></i>
            엔트리 바로가기
            <i class="fa-solid fa-arrow-up-right-from-square"></i>
        </a>
    </div>

    <footer class="text-center text-gray-400 text-sm mt-16">
        <p><i class="fa-solid fa-heart text-rose-300"></i> 2026 티처스랩 교사연구회 5기 · 데이터로 만나는 반려동물 사회 <i class="fa-solid fa-heart text-rose-300"></i></p>
    </footer>
</main>
</body>
</html>
